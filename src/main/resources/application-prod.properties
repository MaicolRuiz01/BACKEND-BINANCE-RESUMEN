# Conexión a la BD. En Railway se inyectan estas variables apuntando a la RED PRIVADA
# (host interno mysql.railway.internal:3306), que evita el viaje por internet del proxy público.
# Si las variables no están, cae al proxy público (comportamiento anterior, no se rompe nada).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://yamanote.proxy.rlwy.net:17809/railway}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kmbaSFuFPvtYsMiAgLdYScUjozYyccxt}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
# Reciclar conexiones ANTES de que Railway las cierre por su lado (evita el "Connection reset by peer"
# / "Communications link failure"). maxLifetime debe ser menor que el wait_timeout del MySQL de Railway.
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:280000}
# keepalive: cada X ms Hikari hace ping a las conexiones ociosas → detecta/renueva las muertas antes de usarlas.
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE:120000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:120000}
spring.datasource.hikari.connection-timeout=${DB_CONN_TIMEOUT:30000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT:5000}

server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5

# Vigilancia de jornada (alarmas por Telegram según el modo del operador).
# venta: minutos sin ventas en curso antes de alertar (y cada cuánto se repite el aviso).
# caja: cada cuántos minutos se informa cuánto lleva el operador cuadrando caja.
jornada.venta.sin-ordenes-min=${JORNADA_VENTA_MIN:5}
jornada.caja.aviso-min=${JORNADA_CAJA_MIN:60}
jornada.vigilancia.interval-ms=${JORNADA_VIGILANCIA_MS:60000}

