# Perfil desarrollo — activar con: -Dspring.profiles.active=dev (o SPRING_PROFILES_ACTIVE=dev)
spring.datasource.url=jdbc:mysql://localhost:3306/binance_dev?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=TRACE
logging.level.org.springframework.orm.jpa=DEBUG
