spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true

# ── Rendimiento (cambios SEGUROS: no cambian el comportamiento, solo optimizan) ──
# Batch fetch: carga las asociaciones perezosas EN LOTES → reduce el N+1 (muchas menos queries → más rápido).
spring.jpa.properties.hibernate.default_batch_fetch_size=16
# Agrupa inserts/updates en lotes (escrituras más rápidas).
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Compresión GZIP de respuestas HTTP → menos bytes por la red, la app carga más rápido.
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

spring.profiles.active=prod
#spring.jackson.time-zone=America/Bogota

spring.task.scheduling.pool.size=5
spring.application.name=binancebackend

# Incluir el mensaje de la excepción en las respuestas de error (el frontend lo usa
# para mostrar mensajes específicos como "Saldo insuficiente...")
server.error.include-message=always
tronscan.apiKey=4799d844-35fc-40ad-9155-b83814c18658
trongrid.apiKey=a2932898-5552-453f-88f7-7f4615aa1c08

# Silenciar IOExceptions normales de SSE cuando el browser desconecta
logging.level.org.apache.catalina.connector=OFF
logging.level.org.apache.coyote.http11.Http11OutputBuffer=OFF
logging.level.org.apache.catalina.core.ContainerBase=OFF

# Debug SQL — activar solo en perfil dev (ver application-dev.properties)
#logging.level.org.springframework.transaction=TRACE
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
#logging.level.org.springframework.orm.jpa=DEBUG


